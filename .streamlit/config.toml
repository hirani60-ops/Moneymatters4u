[theme]
primaryColor = "#00C6A2"
backgroundColor = "#0F1117"
secondaryBackgroundColor = "#1A1D27"
textColor = "#FFFFFF"
font = "sans serif"

[server]
maxUploadSize = 50
enableXsrfProtection = true
runOnSave = false

[client]
toolbarMode = "minimal"
showErrorDetails = true

[browser]
gatherUsageStats = false
serverAddress = "0.0.0.0"

[logger]
level = "info"
